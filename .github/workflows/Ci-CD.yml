name: LAMIS CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v6

      # 2️⃣ Install system dependencies for C extensions
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libpulse-dev \
            libffi-dev \
            libssl-dev \
            libbz2-dev \
            liblzma-dev \
            libsqlite3-dev \
            build-essential \
            python3-dev \
            cmake \
            pkg-config \
            ffmpeg \
            libopencv-dev \
            libsm6 \
            libxext6 \
            libxrender-dev

      # 3️⃣ Setup Python 3.11
      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # 4️⃣ Cache pip packages
      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 5️⃣ Upgrade pip and install Python dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      # 6️⃣ Run unit tests
      - name: Run tests
        run: pytest --maxfail=1 --disable-warnings -q

      # 7️⃣ Build Python package
      - name: Build package
        run: python setup.py sdist bdist_wheel

      # 8️⃣ Cache Docker layers (optional)
      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-docker-

      # 9️⃣ Build Docker image
      - name: Build Docker image
        run: docker build --cache-from=type=local,src=/tmp/.buildx-cache -t lamis:latest .

      # 🔟 Optional deploy to server
      - name: Deploy to server
        if: github.ref == 'refs/heads/main'
        run: |
          scp -r ./dist user@server:/path/to/deploy/
          ssh user@server 'systemctl restart lamis.service'

      # 1️⃣1️⃣ Notify success
      - name: Success Message
        run: echo "LAMIS CI/CD workflow completed successfully!"
