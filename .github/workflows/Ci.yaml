name: LAMIS CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
   inputs:
    
   
jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v5

      # 2️⃣ Setup Python environment
      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ Run unit tests
      - name: Run tests
        run: |
          pytest --maxfail=1 --disable-warnings -q

      # 5️⃣ Build package (if LAMIS is packaged)
      - name: Build package
        run: |
          python setup.py sdist bdist_wheel

      # 6️⃣ Optional: Docker build
      - name: Build Docker image
        run: |
          docker build -t lamis:latest .

      # 7️⃣ Optional: Deploy to server
      - name: Deploy to server
        if: github.ref == 'refs/heads/main'
        run: |
          scp -r ./dist user@server:/path/to/deploy/
          ssh user@server 'systemctl restart lamis.service'

      # 8️⃣ Notify success
      - name: Success Message
        run: echo "LAMIS CI/CD workflow completed successfully!"
